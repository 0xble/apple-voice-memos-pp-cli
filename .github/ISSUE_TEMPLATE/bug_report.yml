name: Bug report
description: Report reproducible CLI behavior using synthetic or redacted data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never attach a real Voice Memos database or recording. Remove titles, transcripts, UUIDs, usernames, and local paths from logs.
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: apple-voice-memos-pp-cli version v0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic or redacted values.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed recordings, transcripts, titles, UUIDs, usernames, databases, and local paths.
          required: true
